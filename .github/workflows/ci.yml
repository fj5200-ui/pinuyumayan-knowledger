name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run compile check
        run: python -m compileall src tests
      - name: Run unit tests
        run: |
          export PYTHONPATH=src
          python -m unittest discover -s tests -p 'test_*.py'
